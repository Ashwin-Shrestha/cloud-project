<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}CloudCart{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f8fafc; color: #1e293b; }
        nav { background: #0f172a; color: white; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; }
        .logo { font-size: 22px; font-weight: 700; }
        .logo span { color: #38bdf8; }
        .cart-link { background: #38bdf8; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .badge { position: fixed; bottom: 16px; right: 16px; background: #1e293b; color: #94a3b8; font-size: 11px; padding: 6px 12px; border-radius: 999px; font-family: monospace; }
        footer { text-align: center; padding: 30px; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Cloud<span>Cart</span></a>
        <a href="/cart" class="cart-link">🛒 Cart</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>CloudCart Demo — Deployed on AWS via Terraform + GitHub Actions</footer>
    <div class="badge">Instance: {{ instance_id }}</div>
</body>
</html>
